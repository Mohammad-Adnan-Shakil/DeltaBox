spring.application.name=deltabox
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/deltabox
spring.datasource.username=postgres
spring.datasource.password=adnanshakil20

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 🗂️ Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.baseline-description=Initial baseline
spring.flyway.out-of-order=false
spring.flyway.validate-on-migrate=true
# Removed: spring.flyway.clean-on-validation-error=true (dangerous - it wipes the DB!)

sync.interval=3600000

# 📄 SpringDoc OpenAPI Configuration
springdoc.api-title=DeltaBox API
springdoc.api-description=AI Race Intelligence Platform for Formula 1 - Predictive Analytics & Historical Data
springdoc.version=1.0.0
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# 🔑 JWT Configuration
jwt.secret=f1PulseSecretKeyForJWTAuthenticationMustBeAtLeast256BitsLongForHS256Algorithm2024!
jwt.expiration=86400000
# ☝️ IMPORTANT: For production, use environment variables:
# jwt.secret=${JWT_SECRET_KEY}
# jwt.expiration=${JWT_EXPIRATION_MS}

# 🤖 Groq API Race Engineer Configuration
groq.api.key=${GROQ_API_KEY}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.3-70b-versatile

# 🔑 Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:5173
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub
